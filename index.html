<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Heart Coding Animation</title>
    <style>
        /* CSS STYLES */
        body {
            margin: 0;
            padding: 0;
            background-color: #050505; /* Dark background */
            overflow: hidden; /* Scrollbar hatane ke liye */
            font-family: 'Courier New', Courier, monospace;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Code Block Style */
        .code-container {
            position: absolute;
            bottom: 30px;
            z-index: 2;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 10px;
            border: 1px solid #333;
            text-align: left;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.2);
        }

        .code-line {
            margin: 3px 0;
            font-size: 14px;
        }

        .keyword { color: #ff69b4; font-weight: bold; } /* Pink */
        .func { color: #00ff00; } /* Green */
        .var { color: #87ceeb; } /* Blue */
        .string { color: #ffd700; } /* Gold */

        .footer-text {
            text-align: center;
            margin-top: 15px;
            font-size: 16px;
            color: #fff;
            text-shadow: 0 0 5px #ff69b4;
            letter-spacing: 1px;
        }
        
        .sub-text {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <!-- Canvas for Animation -->
    <canvas id="canvas"></canvas>

    <!-- Code Text Overlay (Tumhari image jaisa) -->
    <div class="code-container">
        <div class="code-line"><span class="keyword">import</span> <span class="var">heart</span> <span class="keyword">from</span> <span class="string">'love'</span>;</div>
        <div class="code-line"><span class="var">myHeart</span> = <span class="keyword">new</span> <span class="func">Heart</span>();</div>
        <div class="code-line"><span class="var">myHeart</span>.<span class="func">color</span> = <span class="string">'#ff69b4'</span>;</div>
        <div class="code-line"><span class="var">myHeart</span>.<span class="func">glow</span>(<span class="keyword">true</span>);</div>
        
        <div class="footer-text">The Coding Wizard</div>
        <div class="sub-text">Like & Follow For More</div>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        
        // Canvas size set karna
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Stars ka background
        const stars = [];
        const numStars = 150;

        for (let i = 0; i < numStars; i++) {
            stars.push({
                x: Math.random() * width,
                y: Math.random() * height,
                size: Math.random() * 2,
                opacity: Math.random()
            });
        }

        // Heart Particles Logic
        const particles = [];
        // Heart shape equation (Parametric)
        // x = 16sin^3(t)
        // y = 13cos(t) - 5cos(2t) - 2cos(3t) - cos(4t)
        
        function getHeartPoint(t, scale = 10) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
            return {
                x: x * scale + width / 2, // Center screen pe lana
                y: y * scale + height / 2 - 50 // Thora upar shift karna
            };
        }

        // Particles create karna
        for (let i = 0; i < 800; i++) {
            const t = Math.random() * Math.PI * 2;
            // Halka sa scatter effect ke liye random value add karenge
            const pos = getHeartPoint(t, 12); 
            
            particles.push({
                x: Math.random() * width, // Start random position
                y: Math.random() * height,
                targetX: pos.x,
                targetY: pos.y,
                size: Math.random() * 2 + 1,
                color: `hsla(${330 + Math.random() * 30}, 100%, 60%, ${Math.random() * 0.5 + 0.5})`, // Pink shades
                speed: Math.random() * 0.03 + 0.01,
                vx: 0,
                vy: 0
            });
        }

        function drawStars() {
            ctx.fillStyle = "white";
            stars.forEach(star => {
                ctx.globalAlpha = star.opacity;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                // Twinkle effect
                if(Math.random() > 0.99) star.opacity = Math.random();
            });
            ctx.globalAlpha = 1;
        }

        function animate() {
            // Background clear karna (Trace effect ke liye thora transparent black)
            ctx.fillStyle = 'rgba(5, 5, 5, 0.2)';
            ctx.fillRect(0, 0, width, height);

            drawStars();

            // Heart Particles update aur draw
            particles.forEach(p => {
                // Move towards target
                const dx = p.targetX - p.x;
                const dy = p.targetY - p.y;
                
                p.x += dx * p.speed;
                p.y += dy * p.speed;

                // Draw particle
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
